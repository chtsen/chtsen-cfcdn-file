name: Build FongMi Source
permissions:
  contents: write
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install jq python3-pip -y
          pip install base58

      - name: Download remote config.js
        run: wget -O raw_config.js https://pz.v88.qzz.io/?format=2&source=full

      - name: Base58 解码（全文直接解码）
        run: |
          python3 << 'EOF'
          import base58
          with open("raw_config.js", "r", encoding="utf-8") as f:
              b58_str = f.read().strip()
          try:
              raw_bytes = base58.b58decode(b58_str)
              raw_json = raw_bytes.decode("utf-8")
          except Exception as e:
              print(f"Base58解码失败: {e}")
              exit(1)
          with open("source.json", "w", encoding="utf-8") as out:
              out.write(raw_json)
          print("解码成功，生成 source.json")
          EOF

      - name: CMS JSON 转 FongMi 标准sites
        run: |
          jq '{
            "sites": [
              .api_site | to_entries[] | {
                "key": (.key | split(".")[0] | gsub("www";"") | gsub("[.]";"")),
                "name": .value.name,
                "type": 3,
                "api": .value.api,
                "searchable": 1,
                "changeable": 1,
                "recordable": 1
              }
            ]
          }' source.json > fongmi_vod.json

      - name: 输出到 LibreTV/config.js
        run: |
          mkdir -p LibreTV
          cp fongmi_vod.json LibreTV/config.js

      - name: Git 提交更新
        run: |
          git config user.name "Auto Bot"
          git config user.email "bot@github.com"
          git add LibreTV/config.js
          if git diff --staged --quiet; then
            echo "无内容变更，跳过提交"
          else
            git commit -m "自动更新 LibreTV/config.js 点播源"
            git push
          fi
