name: Build FongMi Source
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install jq python3-pip -y
          pip install base58

      - name: Download remote config.js
        run: wget -O raw_config.js https://pz.v88.qzz.io?format=2&source=full

      - name: Extract Base58 & Decode
        run: |
          python3 << 'EOF'
          import base58
          import re

          with open("raw_config.js", "r", encoding="utf-8") as f:
              content = f.read().strip()

          # 匹配Base58字符串
          b58_match = re.search(r'[123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz]{100,}', content)
          if not b58_match:
              print("ERROR: 未找到Base58编码串")
              exit(1)
          b58_str = b58_match.group(0)

          try:
              raw_bytes = base58.b58decode(b58_str)
              raw_json = raw_bytes.decode("utf-8")
          except Exception as e:
              print(f"解码失败: {e}")
              exit(1)

          with open("source.json", "w", encoding="utf-8") as out:
              out.write(raw_json)
          print("Base58解码完成")
          EOF

      - name: CMS JSON 转 FongMi 标准sites
        run: |
          jq '{
            "sites": [
              .api_site | to_entries[] | {
                "key": (.key | split(".")[0] | gsub("www";"") | gsub("[.]";"")),
                "name": .value.name,
                "type": 3,
                "api": .value.api,
                "searchable": 1,
                "changeable": 1,
                "recordable": 1
              }
            ]
          }' source.json > fongmi_vod.json

      - name: 写入 LibreTV/config.js（覆盖全部内容）
        run: |
          mkdir -p LibreTV
          cp fongmi_vod.json LibreTV/config.js

      - name: Git 提交更新
        run: |
          git config user.name "Auto Bot"
          git config user.email "bot@github.com"
          git add LibreTV/config.js
          if git diff --staged --quiet; then
            echo "无内容变更，跳过提交"
          else
            git commit -m "自动更新 LibreTV/config.js 点播源"
            git push
          fi
